services:
  traefik:
    image: traefik:3.6
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    # API/dashboard: entrypoint "traefik" (port 8080), not on :80 / :443. If you publish 8080, lock it down
    # on the host (e.g. ufw: do not open 8080; default deny is enough on many providers). On the node:
    #   ssh -N -L 8080:127.0.0.1:8080 user@$SSH_HOST
    # then open http://127.0.0.1:8080/dashboard/ locally. (Do not use Traefik on public :443 for the raw API
    # without extra auth — we do not add such routes here.)
    command:
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      - --log.level=WARN
      - --ping=true
      - --api=true
      - --api.insecure=true
      - --providers.docker=false
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=relay_edge
      - --entrypoints.http.address=:80
      - --entrypoints.http.http.redirections.entrypoint.to=https
      - --entrypoints.http.http.redirections.entrypoint.scheme=https
      - --entrypoints.https.address=:443
      - --entrypoints.https.http.tls=true
      - --entrypoints.https.http.tls.certresolver=letsencrypt
      - --entrypoints.https.http.tls.domains[0].main=${CNAME}
      - --entrypoints.https.http.tls.domains[0].sans=*.${CNAME}
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    volumes:
      - traefik_acme:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - relay_edge
    healthcheck:
      test: [ 'CMD', 'traefik', 'healthcheck', '--ping' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

networks:
  relay_edge:
    external: true

volumes:
  traefik_acme:
