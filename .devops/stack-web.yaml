services:
  web:
    image: ${IMAGE_ROOT}-web:${IMAGE_TAG}
    networks:
      - relay_edge
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
        monitor: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
      labels:
        - traefik.enable=true
        - traefik.http.routers.${PROJECT}-web.rule=Host(`app.${CNAME}`)
        - traefik.http.routers.${PROJECT}-web.entrypoints=https
        - traefik.http.routers.${PROJECT}-web.tls=true
        - traefik.http.routers.${PROJECT}-web.tls.certresolver=letsencrypt
        - traefik.http.routers.${PROJECT}-web.service=${PROJECT}-web
        - traefik.http.services.${PROJECT}-web.loadbalancer.server.port=80
        - traefik.http.services.${PROJECT}-web.loadbalancer.healthcheck.path=/up
        - traefik.http.services.${PROJECT}-web.loadbalancer.healthcheck.interval=5s
        - traefik.http.services.${PROJECT}-web.loadbalancer.healthcheck.timeout=2s
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://127.0.0.1:80/up >/dev/null || exit 1' ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  relay_edge:
    external: true
