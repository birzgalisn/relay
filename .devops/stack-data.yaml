services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - relay_internal
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"' ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        order: start-first
        failure_action: rollback

  redis:
    image: redis:8.6-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_ARGS=${REDIS_ARGS}
    volumes:
      - redis_data:/data
    networks:
      - relay_internal
    healthcheck:
      test: [ 'CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG' ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        order: start-first
        failure_action: rollback

volumes:
  postgres_data:
  redis_data:

networks:
  relay_internal:
    external: true
