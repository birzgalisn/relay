name: cd

on:
  workflow_call:
    inputs:
      app:
        description: App to deploy
        required: true
        type: string
      image_root:
        description: ghcr.io/owner/repo (image is root-app)
        required: true
        type: string
      image_tag:
        description: Image tag to pull on the VPS
        required: true
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.repository }}-swarm-deploy-${{ inputs.app }}
  cancel-in-progress: false

env:
  SSH_AUTH_SOCK: /tmp/ssh_agent.sock
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SWARM_ADVERTISE_ADDR: ${{ vars.SWARM_ADVERTISE_ADDR }}
  CNAME: ${{ vars.CNAME }}
  PROJECT: ${{ vars.PROJECT }}
  SERVICE_NAME: ${{ inputs.app }}
  IMAGE_ROOT: ${{ inputs.image_root }}
  IMAGE_TAG: ${{ inputs.image_tag }}
  DEPLOY_PHASE: app
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  REDIS_URL: ${{ secrets.REDIS_URL }}

jobs:
  migrate:
    name: Migrate database
    if: inputs.app == 'api'
    uses: ./.github/workflows/migrate.yaml
    secrets: inherit

  deploy:
    name: Docker Swarm deployment
    needs: migrate
    if: ${{ !cancelled() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .devops

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH and deploy stacks
        run: |
          set -euo pipefail
          ssh-agent -a "$SSH_AUTH_SOCK" > /dev/null
          ssh-add - <<< "${{ secrets.SSH_KEY }}"
          mkdir -p ~/.ssh
          {
            echo "HOST *"
            echo "StrictHostKeyChecking no"
          } > ~/.ssh/config

          bash ./.devops/deploy-swarm.sh
